# Quality gate: typecheck + engine unit tests + server build on every push
# and PR. Deployment to Pages stays in static.yml (main only).
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Engine unit tests
        run: npm test
      # Server build (Prisma + API routes) — catches build-only breakage the
      # typecheck can't see (next/dynamic constraints, route exports, …).
      - name: Production build
        run: npm run build
